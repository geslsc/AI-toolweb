<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股選股工具（前端 + 本機後端）</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d9e1ec;
      --text: #1f2937;
      --sub: #6b7280;
      --blue: #2563eb;
      --red: #dc2626;
      --green: #16a34a;
      --orange: #ea580c;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 1200px; margin: 0 auto; display: grid; gap: 14px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    h1 { margin: 0 0 8px; font-size: 1.35rem; }
    .hint { margin: 0; color: var(--sub); font-size: 0.92rem; line-height: 1.5; }
    .controls { margin-top: 12px; display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: end; }
    label { display: block; color: var(--sub); font-size: 0.9rem; margin-bottom: 5px; }
    input { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 0.98rem; outline: none; }
    input:focus { border-color: var(--blue); }
    button { border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 10px 14px; min-width: 100px; cursor: pointer; font-size: 0.95rem; }
    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .status { margin-top: 10px; border-radius: 10px; border: 1px solid #c7d2fe; background: #eef2ff; color: #1d4ed8; padding: 10px 12px; font-size: 0.92rem; display: none; }
    .status.warn { border-color: #fed7aa; background: #fff7ed; color: #c2410c; }
    .status.error { border-color: #fecaca; background: #fef2f2; color: #b91c1c; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .stock-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 6px;
    }
    .stock-head { display: flex; justify-content: space-between; align-items: center; }
    .stock-code { font-size: 1rem; font-weight: 700; }
    .stock-price { font-size: 1.25rem; font-weight: 700; color: var(--blue); }
    .stock-meta { color: var(--sub); font-size: 0.88rem; }
    .stock-row { display: flex; justify-content: space-between; font-size: 0.9rem; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; }
    table { width: 100%; min-width: 1350px; border-collapse: collapse; background: #fff; }
    th, td { text-align: center; padding: 10px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; font-size: 0.92rem; }
    th { background: #f8fafc; font-weight: 700; }
    tr:last-child td { border-bottom: 0; }
    .up { color: var(--red); font-weight: 700; }
    .down { color: var(--green); font-weight: 700; }
    .tag { display: inline-block; border-radius: 999px; padding: 3px 8px; font-size: 0.8rem; color: #fff; font-weight: 700; }
    .tag-buy { background: var(--red); }
    .tag-watch { background: var(--orange); }
    .tag-avoid { background: var(--green); }
    @media (max-width: 860px) { .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>台股選股工具（前端 + 本機後端）</h1>
      <p class="hint">
        輸入多檔股票代碼（逗號分隔），例如：2330, 2317, 2603, 0050。<br>
        前端只呼叫本機 API：<code>http://localhost:3000/api/stock?code=2330</code>
      </p>
      <div class="controls">
        <div>
          <label for="codesInput">股票代碼（多檔）</label>
          <input id="codesInput" type="text" value="2330, 2317, 2603, 0050">
        </div>
        <button id="analyzeBtn" class="primary" type="button">分析</button>
        <button id="clearBtn" type="button">清空</button>
      </div>
      <div id="statusBox" class="status"></div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:1.08rem;">選股儀表板（卡片）</h2>
      <div id="dashboardGrid" class="dashboard-grid"></div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代碼</th>
              <th>名稱</th>
              <th>資料日期</th>
              <th>收盤價</th>
              <th>成交量</th>
              <th>MA5</th>
              <th>MA20</th>
              <th>RSI</th>
              <th>MACD</th>
              <th>建議進場</th>
              <th>停損(-5%)</th>
              <th>目標(+10%)</th>
              <th>建議</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const resultBody = document.getElementById("resultBody");
    const statusBox = document.getElementById("statusBox");
    const dashboardGrid = document.getElementById("dashboardGrid");
    const codesInput = document.getElementById("codesInput");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const clearBtn = document.getElementById("clearBtn");

    function showStatus(message, type = "info") {
      if (!message) {
        statusBox.style.display = "none";
        statusBox.textContent = "";
        statusBox.className = "status";
        return;
      }
      statusBox.style.display = "block";
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function parseCodes(raw) {
      return raw.split(",").map((v) => v.trim()).filter(Boolean);
    }

    function isValidCode(code) {
      return /^\d{4}$/.test(code);
    }

    function toFixedOrNA(value, digits = 2) {
      return Number.isFinite(value) ? Number(value).toFixed(digits) : "N/A";
    }

    function intOrNA(value) {
      return Number.isFinite(value) ? Math.round(value).toLocaleString("zh-TW") : "N/A";
    }

    function suggestByBasicRule(close, rsi, ma20) {
      if (!Number.isFinite(close)) return "N/A";
      if (Number.isFinite(rsi) && rsi > 70) return "避開";
      if (Number.isFinite(ma20) && close > ma20) return "觀察";
      return "等回檔";
    }

    async function fetchStock(code) {
      const url = `/api/stock?code=${encodeURIComponent(code)}`;
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || "資料取得失敗，請確認股票代碼或稍後再試");
      }
      return data;
    }

    function renderSuccessRow(data) {
      const close = Number(data.close);
      const volume = Number(data.volume);
      const ma5 = Number(data.MA5);
      const ma20 = Number(data.MA20);
      const rsi = Number(data.RSI);
      const macd = Number(data.MACD);
      const macdSignal = Number(data.MACDSignal);
      const entry = Number.isFinite(close) ? close : null;
      const stop = Number.isFinite(close) ? close * 0.95 : null;
      const target = Number.isFinite(close) ? close * 1.1 : null;
      const advice = suggestByBasicRule(close, rsi, ma20);
      const adviceClass = advice === "買進" ? "tag-buy" : advice === "觀察" ? "tag-watch" : "tag-avoid";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${data.code}</td>
        <td>${data.name || data.code}</td>
        <td>${data.tradeDate || "N/A"}</td>
        <td>${toFixedOrNA(close, 2)}</td>
        <td>${intOrNA(volume)}</td>
        <td>${toFixedOrNA(ma5, 2)}</td>
        <td>${toFixedOrNA(ma20, 2)}</td>
        <td>${toFixedOrNA(rsi, 1)}</td>
        <td>${Number.isFinite(macd) && Number.isFinite(macdSignal) ? `${macd.toFixed(3)} / ${macdSignal.toFixed(3)}` : "N/A"}</td>
        <td>${toFixedOrNA(entry, 2)}</td>
        <td class="down">${toFixedOrNA(stop, 2)}</td>
        <td class="up">${toFixedOrNA(target, 2)}</td>
        <td><span class="tag ${adviceClass}">${advice}</span></td>
      `;
      resultBody.appendChild(tr);
      renderStockCard(data, { close, rsi, ma20, advice, stop, target });
    }

    function renderStockCard(data, metrics) {
      const adviceClass = metrics.advice === "觀察" ? "tag-watch" : metrics.advice === "等回檔" ? "tag-buy" : "tag-avoid";
      const card = document.createElement("article");
      card.className = "stock-item";
      card.innerHTML = `
        <div class="stock-head">
          <div class="stock-code">${data.code}</div>
          <span class="tag ${adviceClass}">${metrics.advice}</span>
        </div>
        <div class="stock-price">${toFixedOrNA(metrics.close, 2)}</div>
        <div class="stock-meta">資料日期：${data.tradeDate || "N/A"}</div>
        <div class="stock-row"><span>RSI</span><strong>${toFixedOrNA(metrics.rsi, 1)}</strong></div>
        <div class="stock-row"><span>MA20</span><strong>${toFixedOrNA(metrics.ma20, 2)}</strong></div>
        <div class="stock-row"><span>停損價</span><strong class="down">${toFixedOrNA(metrics.stop, 2)}</strong></div>
        <div class="stock-row"><span>目標價</span><strong class="up">${toFixedOrNA(metrics.target, 2)}</strong></div>
      `;
      dashboardGrid.appendChild(card);
    }

    function renderErrorRow(code, message) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${code}</td>
        <td colspan="12" style="color:#b91c1c;">${message}</td>
      `;
      resultBody.appendChild(tr);
      const card = document.createElement("article");
      card.className = "stock-item";
      card.innerHTML = `
        <div class="stock-head">
          <div class="stock-code">${code}</div>
          <span class="tag tag-avoid">避開</span>
        </div>
        <div class="stock-meta" style="color:#b91c1c;">${message}</div>
      `;
      dashboardGrid.appendChild(card);
    }

    async function analyze() {
      const codes = parseCodes(codesInput.value);
      resultBody.innerHTML = "";
      dashboardGrid.innerHTML = "";

      if (!codes.length) {
        showStatus("請先輸入至少一檔股票代碼。", "warn");
        return;
      }

      const invalid = codes.filter((c) => !isValidCode(c));
      if (invalid.length) {
        invalid.forEach((code) => renderErrorRow(code, "股票代碼格式錯誤"));
        showStatus("股票代碼格式錯誤", "error");
        return;
      }

      showStatus("正在查詢最近交易日收盤資料...", "info");
      analyzeBtn.disabled = true;

      let success = 0;
      let fail = 0;

      for (const code of codes) {
        try {
          const data = await fetchStock(code);
          renderSuccessRow(data);
          success += 1;
        } catch (error) {
          renderErrorRow(code, error.message || "資料取得失敗，請確認股票代碼或稍後再試");
          fail += 1;
        }
      }

      if (!success) {
        showStatus("所有股票都查詢失敗。", "error");
      } else if (fail) {
        showStatus(`完成 ${success} 檔，失敗 ${fail} 檔。`, "warn");
      } else {
        showStatus(`完成 ${success} 檔。`, "info");
      }

      analyzeBtn.disabled = false;
    }

    analyzeBtn.addEventListener("click", analyze);
    clearBtn.addEventListener("click", () => {
      codesInput.value = "";
      resultBody.innerHTML = "";
      dashboardGrid.innerHTML = "";
      showStatus("", "info");
    });
  </script>
</body>
</html>
